<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Growth Journey Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <div class="brand">
      <span class="brand-icon">📈</span>
      <div>
        <div class="brand-eyebrow">People Framework · v3</div>
        <div class="brand-name">Growth Journey Calculator</div>
      </div>
    </div>
    <nav class="role-nav">
      <button class="role-tab active" id="tab-manager"  onclick="setRole('manager')">👔 Manager</button>
      <button class="role-tab"        id="tab-member"   onclick="setRole('member')">🧑 Member</button>
      <button class="role-tab"        id="tab-peer"     onclick="setRole('peer')">🤝 Peer</button>
      <button class="role-tab"        id="tab-workflow" onclick="setRole('workflow')">🗺 Workflow</button>
    </nav>
  </header>

  <div id="view-manager" class="view-root"></div>
  <div id="view-member"  class="view-root" style="display:none"></div>
  <div id="view-peer"    class="view-root" style="display:none"></div>
  <div id="view-workflow"class="view-root" style="display:none"></div>
</div>

<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
